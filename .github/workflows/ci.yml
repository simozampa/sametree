name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.12.0, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Smoke-test packed binaries
        run: |
          archive="$(npm pack --silent)"
          npm install --global "./${archive}"
          sametree --version

      - name: Smoke-test Git installation
        run: |
          npm install --global "git+file://${GITHUB_WORKSPACE}"
          sametree --version
